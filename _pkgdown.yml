# This is the configuration for the mizer website using the pkgdown package.

home:
  title: Multiple size-structured resources in mizer
  description: An add-on to the mizer package which allows multiple resource spectra to be added to any mizer model.
  sidebar:
    structure: [source_links, license, authors, dev]
    components:
      source_links:
        title: Links
        text: |
          [Browse source code](https://github.com/sizespectrum/mizerMR)

          [Report a bug](https://github.com/sizespectrum/mizerMR/issues)

url: https://sizespectrum.org/mizerMR

authors:
  Gustav Delius:
    href: https://www.york.ac.uk/maths/staff/gustav-delius/

template:
  bootstrap: 5
  bootswatch: cerulean
  opengraph:
    image:
      src: man/figures/logo.png
      alt: "mizerMR: Multiple size-structured resources in mizer"
    twitter:
      site: "@mizer_model"
      card: summary
toc:
  depth: 3

articles:
- title: Articles
  navbar: Articles
  contents:
  - extension-mechanism

navbar:
  structure:
    left: [intro, reference, articles, news]
    right: [blog, twitter, github]
  components:
    home: ~
    blog:
      text: Blog
      href: https://blog.mizer.sizespectrum.org
    twitter:
       icon: "fab fa-twitter fa-lg"
       aria-label: Twitter
       href: https://twitter.com/mizer_model

reference:
- title: Setting multiple resources
- contents:
  - resource_params
  - setMultipleResources
  - newMRParams
- title: Accessing results of simulations
- contents:
  - NResource
  - plotSpectra
  - getDiet
  - plotDiet
  - plotResourceLevel
  - plotResourcePred
  - animateSpectra
  - params_methods
  - MRArrayResourceBySize
  - MRArrayTimeByResourceBySize
  - is.MRArrayResourceBySize
  - is.MRArrayTimeByResourceBySize
  - plot.MRArrayResourceBySize
- title: Species utilities
- contents:
  - addSpecies
  - removeSpecies
  - renameSpecies
  - expandSizeGrid
- title: Internal helper functions
- contents:
  - starts_with("valid")
  - ends_with("default")
  - mizerMR-class
  - project_methods
  - mizerMR_dynamics
  - plotDietData
  - expect_unchanged
  - .onLoad
  - .strip_mr
